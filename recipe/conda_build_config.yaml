gpu_variant:
  - none
  - cuda-12                         # [linux]
  - cuda-13                         # [linux]
cuda_compiler_version:
  - none
  - 12.8                            # [linux]
  - 13.1                            # [linux]

# cuda_compiler (cuda-nvcc) inherited from aggregate CBC — not redefined here.
# No GCC downgrade needed: Arrow does not compile .cu files (no nvcc invocation).
# It only uses the CUDA driver API (cuda.h / libcuda.so), so any host compiler works.

zip_keys:
  -
    - gpu_variant
    - cuda_compiler_version

libabseil:
  - '20250814.1'
  - '20260107'

libgrpc:
  - '1.74.1'
  - '1.78'

libprotobuf:
  - 6.33.0
  - 6.33.5

zip_keys:
  -
    - libabseil
    - libgrpc
    - libprotobuf
